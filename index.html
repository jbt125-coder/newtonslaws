<body>

window.onload = function() {

var canvas = document.getElementById(‘c’);
var ctx = canvas.getContext(‘2d’);

// Polyfill ctx.ellipse for older WebKit/WKWebView
if (!ctx.ellipse) {
ctx.ellipse = function(x, y, rx, ry, rot, startAngle, endAngle, antiCW) {
ctx.save();
ctx.translate(x, y);
ctx.rotate(rot || 0);
ctx.scale(rx, ry);
ctx.arc(0, 0, 1, startAngle, endAngle, antiCW);
ctx.restore();
};
}

// Polyfill setLineDash for older WebKit
if (!ctx.setLineDash) {
ctx.setLineDash = function() {};
}
var W, H;
var stars = [];
var state = ‘menu’; // menu, lesson, quiz, result
var currentLesson = null;
var lessonStep = 0;
var animT = 0;
var touches = [];
var nameInput = document.getElementById(‘textInput’);

// Quiz state
var quizQuestions = [];
var quizAnswers = [];

var quizScore = 0;
var studentName = ‘’;
var studentPeriod = 0;
var submitStep = 0; // 0=name, 1=period, 2=done

function resize() {
W = document.documentElement.clientWidth || window.innerWidth || screen.width || 390;
H = document.documentElement.clientHeight || window.innerHeight || screen.height || 844;
canvas.width = W;
canvas.height = H;
}
resize();
window.addEventListener(‘resize’, resize);

// Boot test - if you see a blue dot the loop is starting
ctx.fillStyle = ‘#001133’;
ctx.fillRect(0, 0, W, H);
ctx.fillStyle = ‘#4af’;
ctx.beginPath();
ctx.arc(W/2, H/2, 30, 0, Math.PI * 2);
ctx.fill();

// – STARS –
function makeStars() {
stars = [];
for (var i = 0; i < 200; i++) {
stars.push({
x: Math.random(),
y: Math.random(),
r: Math.random() * 1.5 + 0.2,
b: Math.random() * 0.7 + 0.3,
sp: Math.random() * 0.003 + 0.001
});
}
}
makeStars();

function drawStars(alpha) {
alpha = alpha === undefined ? 1 : alpha;
for (var i = 0; i < stars.length; i++) {
var s = stars[i];
var twinkle = s.b + Math.sin(animT * s.sp * 60 + i) * 0.2;
ctx.globalAlpha = Math.min(1, twinkle) * alpha;
ctx.fillStyle = ‘#fff’;
ctx.beginPath();
ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
ctx.fill();
}
ctx.globalAlpha = 1;
}

function drawBg() {
try {
var grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H)*0.7);
grad.addColorStop(0, ‘#05101f’);
grad.addColorStop(1, ‘#000408’);
ctx.fillStyle = grad;
} catch(e) {
ctx.fillStyle = ‘#030a14’;
}
ctx.fillRect(0, 0, W, H);
drawStars();
}

// – UTILITY DRAW –
function drawText(txt, x, y, size, color, align, maxW) {
ctx.save();
ctx.fillStyle = color || ‘#fff’;
ctx.font = ‘bold ’ + size + ‘px “Courier New”, monospace’;
ctx.textAlign = align || ‘center’;
ctx.textBaseline = ‘middle’;
if (maxW) {
// word wrap
var words = txt.split(’ ’);
var lines = [];
var line = ‘’;
for (var i = 0; i < words.length; i++) {
var test = line + (line ? ’ ’ : ‘’) + words[i];
if (ctx.measureText(test).width > maxW && line) {
lines.push(line);
line = words[i];
} else { line = test; }
}
lines.push(line);
var lh = size * 1.4;
var startY = y - (lines.length - 1) * lh / 2;
for (var j = 0; j < lines.length; j++) {
ctx.fillText(lines[j], x, startY + j * lh);
}
} else {
ctx.fillText(txt, x, y);
}
ctx.restore();
}

function drawRect(x, y, w, h, color, radius, alpha) {
ctx.save();
ctx.globalAlpha = alpha !== undefined ? alpha : 1;
ctx.fillStyle = color;
ctx.beginPath();
var r = radius || 0;
ctx.moveTo(x + r, y);
ctx.lineTo(x + w - r, y);
ctx.quadraticCurveTo(x + w, y, x + w, y + r);
ctx.lineTo(x + w, y + h - r);
ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
ctx.lineTo(x + r, y + h);
ctx.quadraticCurveTo(x, y + h, x, y + h - r);
ctx.lineTo(x, y + r);
ctx.quadraticCurveTo(x, y, x + r, y);
ctx.closePath();
ctx.fill();
ctx.restore();
}

function drawRectStroke(x, y, w, h, color, radius, lw) {
ctx.save();
ctx.strokeStyle = color;
ctx.lineWidth = lw || 1;
ctx.beginPath();
var r = radius || 0;
ctx.moveTo(x + r, y);
ctx.lineTo(x + w - r, y);
ctx.quadraticCurveTo(x + w, y, x + w, y + r);
ctx.lineTo(x + w, y + h - r);
ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
ctx.lineTo(x + r, y + h);
ctx.quadraticCurveTo(x, y + h, x, y + h - r);
ctx.lineTo(x, y + r);
ctx.quadraticCurveTo(x, y, x + r, y);
ctx.closePath();
ctx.stroke();
ctx.restore();
}

// Button registry
var buttons = [];
function regBtn(id, x, y, w, h) {
buttons.push({ id: id, x: x, y: y, w: w, h: h });
}
function clearBtns() { buttons = []; }

function drawBtn(id, x, y, w, h, label, sz, highlight) {
var col = highlight ? ‘rgba(30,120,200,0.9)’ : ‘rgba(10,40,80,0.85)’;
var border = highlight ? ‘#6cf’ : ‘#38a’;
drawRect(x - w/2, y - h/2, w, h, col, 12);
drawRectStroke(x - w/2, y - h/2, w, h, border, 12, 1.5);
drawText(label, x, y, sz || 16, ‘#dff’, ‘center’);
regBtn(id, x - w/2, y - h/2, w, h);
}

function hitBtn(btn, tx, ty) {
return tx >= btn.x && tx <= btn.x + btn.w && ty >= btn.y && ty <= btn.y + btn.h;
}

// – SHUFFLE –
function shuffle(arr) {
var a = arr.slice();
for (var i = a.length - 1; i > 0; i--) {
var j = Math.floor(Math.random() * (i + 1));
var t = a[i]; a[i] = a[j]; a[j] = t;
}
return a;
}

function buildQuiz() {
var pool = shuffle(QUIZ_BANK).slice(0, 10);
quizQuestions = pool.map(function(q) {
var correctText = q.choices[q.a];
var shuffled = shuffle(q.choices);
return {
q: q.q,
choices: shuffled,
correct: shuffled.indexOf(correctText)
};
});
quizAnswers = new Array(10).fill(-1);
quizChecked = false;
quizScore = 0;
reviewMode = false;
}

function drawMenu() {
drawBg();
// Title
ctx.save();
var grad = ctx.createLinearGradient(W/2 - 150, 0, W/2 + 150, 0);
grad.addColorStop(0, ‘#4af’);
grad.addColorStop(0.5, ‘#fff’);
grad.addColorStop(1, ‘#4af’);
ctx.fillStyle = grad;
ctx.font = ‘bold 28px “Courier New”, monospace’;
ctx.textAlign = ‘center’;
ctx.textBaseline = ‘middle’;
ctx.fillText(‘LAWS OF THE’, W/2, H * 0.1);
ctx.font = ‘bold 36px “Courier New”, monospace’;
ctx.fillStyle = ‘#4af’;
ctx.fillText(‘UNIVERSE’, W/2, H * 0.1 + 44);
ctx.restore();

// Subtitle
drawText(‘Newton  |  Kepler  |  Gravity’, W/2, H * 0.1 + 82, 13, ‘#6af’);

// Menu items
var startY = H * 0.26;
var bh = 52;
var gap = 10;
var bw = W * 0.82;

for (var i = 0; i < menuItems.length; i++) {
var item = menuItems[i];
var y = startY + i * (bh + gap);
var highlight = item.id === ‘playall’ || item.id === ‘quiz’;
drawRect(W/2 - bw/2, y, bw, bh, item.color, 12, 0.85);
drawRectStroke(W/2 - bw/2, y, bw, bh, highlight ? ‘#f84’ : ‘#38a’, 12, highlight ? 2 : 1);
drawText(item.label, W/2, y + bh/2, highlight ? 17 : 16, highlight ? ‘#fc8’ : ‘#cef’);
regBtn(‘menu_’ + item.id, W/2 - bw/2, y, bw, bh);
}

// Orbit decoration
ctx.save();
ctx.globalAlpha = 0.08;
ctx.strokeStyle = ‘#4af’;
ctx.lineWidth = 1;
ctx.beginPath();
ctx.ellipse(W/2, H * 0.08, 80, 20, 0, 0, Math.PI * 2);
ctx.stroke();
ctx.restore();
}

// – LESSON SCREEN –
function getLessonById(id) {
for (var i = 0; i < LESSONS.length; i++) {
if (LESSONS[i].id === id) return LESSONS[i];
}
return null;
}

function drawLessonStep() {
var lesson = currentLesson;
var step = lesson.steps[lessonStep];
drawBg();
var topY = 52;

// Header bar
drawRect(0, 0, W, topY, ‘rgba(0,20,50,0.9)’, 0);
drawText(lesson.title, W/2, 26, 15, ‘#4af’);

// Menu btn top left
drawBtn(‘menu’, 36, 26, 60, 34, ‘MENU’, 12);
// Back btn
if (lessonStep > 0) drawBtn(‘back’, 110, 26, 60, 34, ‘BACK’, 12);

if (step.type === ‘equation’) {
drawEquationStep(step);
} else if (step.type === ‘anim’) {
drawAnimStep(step);
}

// Next / Continue
var isLast = lessonStep === lesson.steps.length - 1;
var btnLabel = isLast ? (playAllMode ? ‘NEXT TOPIC’ : ‘DONE’) : ‘NEXT’;
drawBtn(‘next’, W/2, H - 52, 160, 44, btnLabel, 16, true);
}

function drawEquationStep(step) {
var panelY = 68;
var panelH = H * 0.32;
drawRect(W * 0.05, panelY, W * 0.9, panelH, ‘rgba(0,30,70,0.85)’, 14);
drawRectStroke(W * 0.05, panelY, W * 0.9, panelH, ‘#246’, 14, 1);

drawText(step.heading, W/2, panelY + 28, 15, ‘#7df’, ‘center’);

// Equation lines
var lines = step.equation.split(’\n’);
var eqY = panelY + 60;
ctx.save();
var eqGrad = ctx.createLinearGradient(W/2 - 100, 0, W/2 + 100, 0);
eqGrad.addColorStop(0, ‘#f84’);
eqGrad.addColorStop(0.5, ‘#ffa’);
eqGrad.addColorStop(1, ‘#f84’);
ctx.fillStyle = eqGrad;
ctx.textAlign = ‘center’;
ctx.textBaseline = ‘middle’;
var lh = lines.length > 2 ? 28 : 36;
var fs = lines.length > 2 ? 20 : 28;
ctx.font = ’bold ’ + fs + ‘px “Courier New”, monospace’;
for (var i = 0; i < lines.length; i++) {
ctx.fillText(lines[i], W/2, eqY + i * lh);
}
ctx.restore();

// Body text
var bodyY = panelY + panelH + 20;
var bodyLines = step.body.split(’\n’);
var by = bodyY;
for (var j = 0; j < bodyLines.length; j++) {
if (bodyLines[j].trim() === ‘’) { by += 14; continue; }
drawText(bodyLines[j], W/2, by, 13, ‘#bde’, ‘center’, W * 0.86);
by += 40;
}
}

function drawAnimStep(step) {
var panelY = 68;
var animH = H * 0.42;
drawRect(W * 0.03, panelY, W * 0.94, animH, ‘rgba(0,15,35,0.9)’, 14);
drawRectStroke(W * 0.03, panelY, W * 0.94, animH, ‘#246’, 14, 1);
drawText(step.heading, W/2, panelY + 22, 14, ‘#7df’);

var cx = W/2, cy = panelY + animH/2 + 10;
var ar = animH/2 - 36;

// Dispatch to animation
var key = step.animKey;
if (key === ‘spring’) animSpring(cx, cy, ar);
else if (key === ‘neap’) animNeap(cx, cy, ar);
else if (key === ‘n1_space’) animN1Space(cx, cy, ar);
else if (key === ‘n1_skate’) animN1Skate(cx, cy, ar);
else if (key === ‘n2_rocket’) animN2Rocket(cx, cy, ar);
else if (key === ‘n2_balls’) animN2Balls(cx, cy, ar);
else if (key === ‘n3_rocket’) animN3Rocket(cx, cy, ar);
else if (key === ‘n3_astro’) animN3Astro(cx, cy, ar);
else if (key === ‘k1_orbit’) animK1Orbit(cx, cy, ar);
else if (key === ‘k2_sweep’) animK2Sweep(cx, cy, ar);
else if (key === ‘k3_compare’) animK3Compare(cx, cy, ar);

// Body text
var bodyY = panelY + animH + 18;
drawText(step.body, W/2, bodyY + 16, 12, ‘#bde’, ‘center’, W * 0.88);
}

// – ANIMATIONS –
function animSpring(cx, cy, ar) {
var t = animT * 0.3;
// Sun on left
var sunX = cx - ar * 0.78;
ctx.save();
var sg = ctx.createRadialGradient(sunX, cy, 0, sunX, cy, 22);
sg.addColorStop(0, ‘#fff8a0’);
sg.addColorStop(0.4, ‘#ffcc00’);
sg.addColorStop(1, ‘rgba(255,150,0,0)’);
ctx.fillStyle = sg;
ctx.beginPath();
ctx.arc(sunX, cy, 28, 0, Math.PI * 2);
ctx.fill();
ctx.restore();
drawText(‘SUN’, sunX, cy + 34, 10, ‘#fc8’);

// Earth center
var eg = ctx.createRadialGradient(cx, cy, 0, cx, cy, 18);
eg.addColorStop(0, ‘#4af’);

function animK2Sweep(cx, cy, ar) {
var a = ar * 0.8, b = ar * 0.5;
var c = Math.sqrt(a * a - b * b);
var sunX = cx - c * 0.7;

// Draw two swept areas
var dt = 0.4; // time interval
var t1 = animT * 0.4;

// Near perihelion (fast section) - near sun side
var angle1 = -0.3;
var angle2 = angle1 + dt * 1.8; // larger arc = faster
ctx.save();
ctx.fillStyle = ‘rgba(255,150,50,0.25)’;
ctx.beginPath();
ctx.moveTo(sunX, cy);
for (var aa = angle1; aa <= angle2; aa += 0.02) {
ctx.lineTo(cx + Math.cos(aa) * a, cy + Math.sin(aa) * b);
}
ctx.closePath();
ctx.fill();
ctx.restore();

// Near aphelion (slow section) - far side
var angle3 = Math.PI - 0.5;
var angle4 = angle3 + dt * 0.7; // smaller arc = slower
ctx.save();
ctx.fillStyle = ‘rgba(100,150,255,0.25)’;
ctx.beginPath();
ctx.moveTo(sunX, cy);
for (var bb = angle3; bb <= angle4; bb += 0.02) {
ctx.lineTo(cx + Math.cos(bb) * a, cy + Math.sin(bb) * b);
}
ctx.closePath();
ctx.fill();
ctx.restore();

// Orbit ellipse
ctx.save();
ctx.translate(cx, cy);
ctx.strokeStyle = ‘rgba(100,180,255,0.35)’;
ctx.lineWidth = 1.5;
ctx.setLineDash([4,4]);
ctx.beginPath(); ctx.ellipse(0,0,a,b,0,0,Math.PI*2); ctx.stroke();
ctx.setLineDash([]);
ctx.restore();

// Sun
ctx.save();
var sg = ctx.createRadialGradient(sunX, cy, 0, sunX, cy, 20);
sg.addColorStop(0,’#fff8a0’); sg.addColorStop(0.4,’#fc0’); sg.addColorStop(1,‘rgba(255,150,0,0)’);
ctx.fillStyle = sg;
ctx.beginPath(); ctx.arc(sunX, cy, 20, 0, Math.PI*2); ctx.fill();
ctx.restore();

// Animated planet
// Speed varies with Kepler’s 2nd: use simple approximation
var rawAngle = t1 % (Math.PI * 2);
var px = cx + Math.cos(rawAngle) * a;
var py = cy + Math.sin(rawAngle) * b;
ctx.fillStyle = ‘#4af’;
ctx.beginPath(); ctx.arc(px, py, 8, 0, Math.PI*2); ctx.fill();

drawText(’= Equal Areas’, cx, cy + b + 20, 11, ‘#fc8’);
}

function animK3Compare(cx, cy, ar) {

var quizPage = 0; // current question index in display (for scroll)
function drawQuiz() {
drawBg();

drawSubmitScreen();
return;
}

if (reviewMode) {
drawReview();
return;
}

if (quizChecked) {
drawQuizResults();
return;
}

// Show current question
var qi = quizPage;
var q = quizQuestions[qi];
var progress = (qi + 1) + ’ / 10’;

// Question box

// Choices
var choiceY = qboxY + qboxH + 16;
var choiceH = 52;
var choiceW = W * 0.88;
for (var i = 0; i < q.choices.length; i++) {
var cy2 = choiceY + i * (choiceH + 10);
var selected = quizAnswers[qi] === i;
var bg = selected ? ‘rgba(20,80,160,0.9)’ : ‘rgba(5,25,55,0.85)’;
var border = selected ? ‘#6cf’ : ‘#246’;
drawRect(W*0.06, cy2, choiceW, choiceH, bg, 10);
drawRectStroke(W*0.06, cy2, choiceW, choiceH, border, 10, selected ? 2 : 1);
drawText(q.choices[i], W/2, cy2 + choiceH/2, 13, selected ? ‘#fff’ : ‘#bde’, ‘center’, choiceW - 20);
regBtn(‘choice_’ + i, W*0.06, cy2, choiceW, choiceH);
}

// Prev/Next
var navY = choiceY + 4 * (choiceH + 10) + 16;
if (qi > 0) drawBtn(‘qprev’, W/2 - 90, navY, 120, 42, ‘PREV’, 14);
if (qi < 9) {
drawBtn(‘qnext’, W/2 + 90, navY, 120, 42, ‘NEXT’, 14, true);
} else {
drawBtn(‘qcheck’, W/2, navY, 180, 42, ‘CHECK ANSWERS’, 14, true);
}
}

function drawQuizResults() {
drawBg();
var topY = 52;
drawRect(0, 0, W, topY, ‘rgba(0,20,50,0.9)’, 0);
drawText(‘RESULTS’, W/2, 26, 16, ‘#4af’);
drawBtn(‘menu’, 36, 26, 60, 34, ‘MENU’, 12);

var scoreColor = quizScore >= 8 ? ‘#4f8’ : quizScore >= 6 ? ‘#ffa’ : ‘#f64’;
drawText(quizScore + ’ / 10’, W/2, H * 0.32, 52, scoreColor);
var msg = quizScore === 10 ? ‘PERFECT!’ : quizScore >= 8 ? ‘Excellent!’ : quizScore >= 6 ? ‘Good job!’ : quizScore >= 4 ? ‘Keep studying!’ : ‘Review the lessons!’;
drawText(msg, W/2, H * 0.32 + 60, 20, ‘#dff’);

drawBtn(‘review’, W/2, H * 0.60, W * 0.7, 48, ‘REVIEW WRONG ANSWERS’, 14);
drawBtn(‘retry’, W/2, H * 0.60 + 66, W * 0.7, 48, ‘TRY AGAIN’, 14);
drawBtn(‘submit’, W/2, H * 0.60 + 132, W * 0.7, 48, ‘SUBMIT SCORE’, 16, true);
}

function drawReview() {
drawBg();
var topY = 52;
drawRect(0, 0, W, topY, ‘rgba(0,20,50,0.9)’, 0);
drawText(‘REVIEW’, W/2, 26, 16, ‘#4af’);
drawBtn(‘back_results’, 36, 26, 60, 34, ‘BACK’, 12);

var scrollY = topY + 14 - reviewScroll;
for (var i = 0; i < quizQuestions.length; i++) {
var q = quizQuestions[i];
var userA = quizAnswers[i];
var correct = userA === q.correct;
if (correct) continue; // only wrong ones

var blockH = 110;
var by = scrollY;
scrollY += blockH + 10;

if (by + blockH < topY || by > H) continue;

drawRect(W*0.04, by, W*0.92, blockH, 'rgba(60,0,0,0.8)', 10);
drawRectStroke(W*0.04, by, W*0.92, blockH, '#844', 10, 1);
drawText(q.q, W/2, by + 20, 11, '#fdd', 'center', W * 0.84);
var yourText = userA >= 0 ? q.choices[userA] : 'Not answered';
drawText('Your answer: ' + yourText, W/2, by + 56, 11, '#f86', 'center', W * 0.84);
drawText('Correct: ' + q.choices[q.correct], W/2, by + 82, 11, '#4f8', 'center', W * 0.84);

}

var allCorrect = true;
for (var j = 0; j < quizQuestions.length; j++) {
if (quizAnswers[j] !== quizQuestions[j].correct) { allCorrect = false; break; }
}
if (allCorrect) {
drawText(‘You got them all right!’, W/2, topY + 60, 16, ‘#4f8’);
}
}

var reviewScroll = 0;

function drawSubmitScreen() {
if (submitStep === 1) {
// Name entry
drawText(‘Enter Your Name’, W/2, H * 0.30, 20, ‘#4af’);
drawText(‘Type in the field below’, W/2, H * 0.30 + 36, 13, ‘#7af’);
nameInput.style.visibility = ‘visible’; nameInput.style.pointerEvents = ‘auto’;

drawText(‘Then tap CONTINUE’, W/2, H * 0.60, 14, ‘#7af’);
drawBtn(‘name_continue’, W/2, H * 0.72, 180, 48, ‘CONTINUE’, 16, true);

} else if (submitStep === 2) {
// Period select
nameInput.style.visibility = ‘hidden’; nameInput.style.pointerEvents = ‘none’;
drawText(‘Select Your Period’, W/2, H * 0.28, 20, ‘#4af’);
var periods = [‘1’,‘2’,‘3’,‘4’,‘5’,‘6’,‘7’];
var bw = 60, bh = 60, gap = 14;
var total = periods.length * bw + (periods.length - 1) * gap;
var startX = W/2 - total/2;
for (var i = 0; i < periods.length; i++) {
var px2 = startX + i * (bw + gap) + bw/2;
var sel = selectedPeriod === i + 1;
drawRect(px2 - bw/2, H * 0.42, bw, bh, sel ? ‘rgba(30,100,200,0.9)’ : ‘rgba(10,30,70,0.85)’, 10);
drawRectStroke(px2 - bw/2, H * 0.42, bw, bh, sel ? ‘#6cf’ : ‘#246’, 10, sel ? 2 : 1);
drawText(periods[i], px2, H * 0.42 + bh/2, 22, sel ? ‘#fff’ : ‘#8af’);
regBtn(‘period_’ + (i+1), px2 - bw/2, H * 0.42, bw, bh);
}
if (selectedPeriod > 0) {
drawBtn(‘period_continue’, W/2, H * 0.68, 180, 48, ‘CONTINUE’, 16, true);
}
}
}

function drawFinalScreen() {
drawBg();
var topY = 52;
drawRect(0, 0, W, topY, ‘rgba(0,20,50,0.9)’, 0);
drawText(‘SUBMITTED’, W/2, 26, 16, ‘#4af’);

// Star decorations
ctx.save();
ctx.fillStyle = ‘#fc8’;
for (var i = 0; i < 5; i++) {
drawStar5(W/2 - 80 + i * 40, H * 0.22, quizScore >= (i * 2 + 2) ? 14 : 10, quizScore >= (i * 2 + 2));
}
ctx.restore();

drawText(studentName, W/2, H * 0.35, 26, ‘#fff’);
drawText(’Period ’ + studentPeriod, W/2, H * 0.35 + 42, 18, ‘#7af’);

var scoreColor = quizScore >= 8 ? ‘#4f8’ : quizScore >= 6 ? ‘#ffa’ : ‘#f64’;
drawText(quizScore + ’ / 10’, W/2, H * 0.55, 52, scoreColor);
drawText(‘Quiz Score’, W/2, H * 0.55 + 52, 14, ‘#7af’);

drawRect(W*0.06, H*0.72, W*0.88, 70, ‘rgba(0,30,70,0.85)’, 12);
drawRectStroke(W*0.06, H*0.72, W*0.88, 70, ‘#246’, 12, 1);
drawText(‘Take a screenshot and’, W/2, H*0.72 + 24, 13, ‘#adf’);
drawText(‘submit it in Canvas!’, W/2, H*0.72 + 48, 13, ‘#adf’);

drawBtn(‘menu_final’, W/2, H - 52, 160, 44, ‘MAIN MENU’, 14, true);
}

function drawStar5(x, y, r, filled) {
ctx.beginPath();
for (var i = 0; i < 10; i++) {
var angle = (i * Math.PI / 5) - Math.PI / 2;
var rad = i % 2 === 0 ? r : r * 0.4;
var px = x + Math.cos(angle) * rad;
var py = y + Math.sin(angle) * rad;
if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
}
ctx.closePath();
if (filled) {
ctx.fillStyle = ‘#fc8’;
ctx.fill();
} else {
ctx.strokeStyle = ‘#666’;
ctx.lineWidth = 1;
ctx.stroke();
}
}

// – TOUCH HANDLING –
var touchStartY = 0;
canvas.addEventListener(‘touchstart’, function(e) {
e.preventDefault();
var touch = e.changedTouches[0];
var tx = touch.clientX, ty = touch.clientY;
touchStartY = ty;
handleTap(tx, ty);
}, { passive: false });

canvas.addEventListener(‘touchmove’, function(e) {
e.preventDefault();
if (state === ‘quiz’ && reviewMode) {
var dy = e.changedTouches[0].clientY - touchStartY;
reviewScroll -= dy * 0.5;
reviewScroll = Math.max(0, reviewScroll);
touchStartY = e.changedTouches[0].clientY;
}
}, { passive: false });

canvas.addEventListener(‘click’, function(e) {
handleTap(e.clientX, e.clientY);
});

nameInput.addEventListener(‘touchstart’, function(e) { e.stopPropagation(); });
nameInput.addEventListener(‘click’, function(e) { e.stopPropagation(); });

function handleTap(tx, ty) {
for (var i = 0; i < buttons.length; i++) {
var btn = buttons[i];
if (hitBtn(btn, tx, ty)) {
handleBtnTap(btn.id, tx, ty);
return;
}
}
}

function handleBtnTap(id, tx, ty) {
if (id === ‘menu’ || id === ‘menu_final’) {
state = ‘menu’;
playAllMode = false;
nameInput.style.visibility = ‘hidden’; nameInput.style.pointerEvents = ‘none’;
submitStep = 0;
reviewMode = false;
return;
}

if (state === ‘menu’) {
if (id === ‘menu_playall’) {
playAllMode = true;
playAllIndex = 0;
currentLesson = getLessonById(playAllLessons[0]);
lessonStep = 0;
animT = 0;
state = ‘lesson’;
} else if (id === ‘menu_quiz’) {
buildQuiz();
quizPage = 0;
state = ‘quiz’;
} else {
var lid = id.replace(‘menu_’, ‘’);
var lesson = getLessonById(lid);
if (lesson) {
currentLesson = lesson;
lessonStep = 0;
animT = 0;
playAllMode = false;
state = ‘lesson’;
}
}
return;
}

if (state === ‘lesson’) {
if (id === ‘back’) {
if (lessonStep > 0) { lessonStep--; animT = 0; }
return;
}
if (id === ‘next’) {
if (lessonStep < currentLesson.steps.length - 1) {
lessonStep++;
animT = 0;
} else {
// End of lesson
if (playAllMode) {
playAllIndex++;
if (playAllIndex < playAllLessons.length) {
currentLesson = getLessonById(playAllLessons[playAllIndex]);
lessonStep = 0;
animT = 0;
} else {
// All done, go to quiz prompt
buildQuiz();
quizPage = 0;
state = ‘quiz’;
playAllMode = false;
}
} else {
state = ‘menu’;
}
}
return;
}
return;
}

if (state === ‘quiz’) {
if (id === ‘back_results’) { reviewMode = false; return; }
if (id === ‘review’) { reviewMode = true; reviewScroll = 0; return; }
if (id === ‘retry’) { buildQuiz(); quizPage = 0; return; }
if (id === ‘submit’) { submitStep = 1; return; }

if (submitStep === 1) {
  if (id === 'name_continue') {
    var n = nameInput.value.trim();
    if (n.length > 0) {
      studentName = n;
      submitStep = 2;
      nameInput.style.visibility = 'hidden'; nameInput.style.pointerEvents = 'none';
      nameInput.blur();
    }
  }
  return;
}

if (submitStep === 2) {
  if (id.indexOf('period_') === 0 && id !== 'period_continue') {
    selectedPeriod = parseInt(id.replace('period_', ''));
    return;
  }
  if (id === 'period_continue' && selectedPeriod > 0) {
    studentPeriod = selectedPeriod;
    state = 'final';
    return;
  }
  return;
}

if (id.indexOf('choice_') === 0) {
  var ci = parseInt(id.replace('choice_', ''));
  quizAnswers[quizPage] = ci;
  return;
}
if (id === 'qprev') { if (quizPage > 0) quizPage--; return; }
if (id === 'qnext') { if (quizPage < 9) quizPage++; return; }
if (id === 'qcheck') {
  quizChecked = true;
  quizScore = 0;
  for (var j = 0; j < 10; j++) {
    if (quizAnswers[j] === quizQuestions[j].correct) quizScore++;
  }
  return;
}
return;

}
}

// – MAIN LOOP –
function loop() {
requestAnimationFrame(loop);
animT += 0.016;
clearBtns();
ctx.clearRect(0, 0, W, H);
try {
if (state === ‘menu’) {
drawMenu();
} else if (state === ‘lesson’) {
drawLessonStep();
} else if (state === ‘quiz’) {
drawQuiz();
} else if (state === ‘final’) {
drawFinalScreen();
}
} catch(e) {
ctx.fillStyle = ‘#111’;
ctx.fillRect(0, 0, W, H);
ctx.fillStyle = ‘#f44’;
ctx.font = ‘14px monospace’;
ctx.textAlign = ‘left’;
ctx.textBaseline = ‘top’;
var msg = ‘ERR: ’ + String(e);
var words = msg.split(’ ’);
var line = ‘’, ey = 60;
for (var wi = 0; wi < words.length; wi++) {
var test = line + words[wi] + ’ ’;
if (test.length > 38) { ctx.fillText(line, 20, ey); ey += 22; line = words[wi] + ’ ‘; }
else { line = test; }
}
ctx.fillText(line, 20, ey);
ctx.fillStyle = ‘#fa4’;
ctx.fillText(‘state:’ + state, 20, ey + 30);
if (currentLesson) { ctx.fillText(‘lesson:’ + currentLesson.id + ’ s:’ + lessonStep, 20, ey + 52); }
}
}

loop();

}; // end window.onload
</script>
